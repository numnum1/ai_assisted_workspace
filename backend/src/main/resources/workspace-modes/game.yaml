id: game
name: Spiel-Planung
editorMode: none
rootMetaLabel: Projekt-Metadaten
rootMetaIcon: sword
levels:
  - key: chapter
    label: Quest
    labelNew: Neue Quest
    icon: sword
  - key: scene
    label: Phase
    labelNew: Neue Phase
    icon: layers
  - key: action
    label: Task
    labelNew: Neuer Task
    icon: align-left
metaSchemas:
  root:
    filename: game-root.json
    fields:
      - key: title
        label: Titel
        type: input
        placeholder: Projektname...
        defaultValue: ""
      - key: description
        label: Kurzbeschreibung
        type: input
        placeholder: Ein Satz...
        defaultValue: ""
      - key: synopsis
        label: Vision (für KI)
        type: largetextarea
        placeholder: Spielidee, Genre, Zielgruppe...
        defaultValue: ""
      - key: tone
        label: Stil
        type: input
        placeholder: z.B. dark fantasy, cozy...
        defaultValue: ""
  chapter:
    filename: quest.json
    fields:
      - key: title
        label: Titel
        type: input
        placeholder: Quest-Titel...
        defaultValue: ""
      - key: description
        label: Beschreibung
        type: textarea
        placeholder: Was soll der Spieler tun?
        defaultValue: ""
  scene:
    filename: stage.json
    fields:
      - key: title
        label: Titel
        type: input
        placeholder: Phasen-Titel...
        defaultValue: ""
      - key: description
        label: Beschreibung
        type: textarea
        placeholder: Beschreibung...
        defaultValue: ""
      - key: location
        label: Ort / Map
        type: input
        placeholder: Wo spielt das?
        defaultValue: ""
      - key: time
        label: Timing
        type: input
        placeholder: z.B. Act 1...
        defaultValue: ""
      - key: characters
        label: NPCs / Rollen
        type: textarea
        placeholder: Beteiligte Charaktere...
        defaultValue: ""
      - key: initial_situation
        label: Ausgangslage
        type: textarea
        placeholder: Startzustand...
        defaultValue: ""
      - key: goal
        label: Ziel der Phase
        type: textarea
        placeholder: Was muss erreicht werden?
        defaultValue: ""
      - key: outcome
        label: Ergebnis
        type: textarea
        placeholder: Was passiert danach?
        defaultValue: ""
      - key: pov
        label: Perspektive
        type: input
        defaultValue: ""
      - key: tone
        label: Stimmung
        type: input
        defaultValue: ""
  action:
    filename: task.json
    fields:
      - key: title
        label: Titel
        type: input
        placeholder: Task-Titel...
        defaultValue: ""
      - key: description
        label: Beschreibung
        type: textarea
        placeholder: Details...
        defaultValue: ""
