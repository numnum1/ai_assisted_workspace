server:
  port: 8080

app:
  data:
    data-dir: ${APP_DATA_DIR:}
  ai:
    api-url: https://api.eecc.ai
    api-key: ${AI_API_KEY:your-api-key-here}
    model: gpt-5.2
  project:
    path: ${PROJECT_PATH:}
    always-include: []
  git:
    token: ${GITHUB_TOKEN:}

logging:
  level:
    com.assistant.controller.ChatController: DEBUG
    com.assistant.service.AiApiClient: DEBUG
    com.assistant.service.ToolExecutor: DEBUG
    com.assistant.service.ContextService: DEBUG

spring:
  profiles:
    active: local
  web:
    resources:
      static-locations: classpath:/static/
